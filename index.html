<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dima Payne</title>
    <meta
      name="description"
      content="Portfolio of Dima Timofeev – musician, sound designer, and frontend developer."
    />

    <script>
      const theme = localStorage.getItem('theme')

      if (
        theme === 'light' ||
        (!theme && window.matchMedia('(prefers-color-scheme: light)').matches)
      ) {
        document.documentElement.classList.add('light')
      }
    </script>

    <meta property="og:title" content="Dima Payne" />
    <meta
      property="og:description"
      content="Portfolio of Dima Payne – musician, sound designer, and frontend developer."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dimapayne.com" />
    <meta property="og:image" content="https://dimapayne.com/images/og-image.webp" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
